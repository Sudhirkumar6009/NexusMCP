version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nexusmcp-postgres
    environment:
      POSTGRES_USER: nexusmcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusmcp_dev}
      POSTGRES_DB: NexusMCP
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusmcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: nexusmcp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service (Node.js)
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: nexusmcp-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nexusmcp:${POSTGRES_PASSWORD:-nexusmcp_dev}@postgres:5432/NexusMCP
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Client (Next.js)
  client:
    build:
      context: ../../apps/client
      dockerfile: Dockerfile
    container_name: nexusmcp-client
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
    ports:
      - "5000:5000"
    depends_on:
      - api

  # Agent Runtime (Python)
  agent-runtime:
    build:
      context: ../../services/agent-runtime
      dockerfile: Dockerfile
    container_name: nexusmcp-agent-runtime
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3000
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy

  # Workflow Engine (Python)
  workflow-engine:
    build:
      context: ../../services/workflow-engine
      dockerfile: Dockerfile
    container_name: nexusmcp-workflow-engine
    environment:
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy

  # MCP Connectors (Python)
  mcp-connectors:
    build:
      context: ../../services/mcp-connectors
      dockerfile: Dockerfile
    container_name: nexusmcp-mcp-connectors
    environment:
      REDIS_URL: redis://redis:6379
      JIRA_URL: ${JIRA_URL}
      JIRA_TOKEN: ${JIRA_TOKEN}
      SLACK_TOKEN: ${SLACK_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy

  # Context Manager (Python)
  context-manager:
    build:
      context: ../../services/context-manager
      dockerfile: Dockerfile
    container_name: nexusmcp-context-manager
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: nexusmcp-network
